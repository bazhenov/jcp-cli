name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  typos:
    name: Check typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  build:
    name: Build and test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # In CI we want to rely on yaml to specify Rust toolchain version.
      # To avoid any misconfigurations, we remove toolchain file in order to guarantee that
      # the toolchain installed by dtolnay/rust-toolchain will be used
      - name: Remove explicit-toolchain file
        # need to specify shell, because on Windows it's cmd by default
        shell: bash
        run: rm -f rust-toolchain rust-toolchain.toml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install system packages
        if: runner.os == 'Linux'
        run: sudo apt-get install libglib2.0-dev libsecret-1-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt --check
